<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TAK.NZ Display</title>
  <link rel="icon" type="image/svg+xml" href="/static/tak-nz-logo.svg"/>
  <link rel="stylesheet" href="/static/maplibre-gl.css"/>
  <script src="/static/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; font-family: system-ui, -apple-system, sans-serif; }

    #layout {
      display: flex; width: 100%; height: 100%;
    }

    /* Left 3/4: map */
    #map-container {
      flex: 3; position: relative; min-width: 0;
    }
    #map { width: 100%; height: 100%; }

    /* Right 1/3: info panel */
    #info-panel {
      flex: 1; display: flex; flex-direction: column;
      background: #111; color: #eee; padding: 2.5vw;
      border-left: 1px solid #2a2a2a; overflow-y: auto;
    }

    /* Branding */
    #branding {
      display: flex; align-items: center; gap: 1.2vw; margin-bottom: 3vh;
    }
    #branding img { height: clamp(2.8rem, 4.5vw, 4.2rem); width: auto; flex-shrink: 0; }
    #branding-text { display: flex; flex-direction: column; }
    #branding h1 {
      font-size: clamp(0.85rem, 1.4vw, 1.3rem); font-weight: 600;
      color: #fff; letter-spacing: 0.02em; line-height: 1.3;
    }
    #branding h2 {
      font-size: clamp(0.65rem, 1vw, 0.95rem); font-weight: 300;
      color: #999; letter-spacing: 0.01em; line-height: 1.3;
    }

    /* Dividers */
    .divider {
      border: 0; border-top: 1px solid #2a2a2a; margin: 2vh 0;
    }

    /* Stats section */
    #stats { flex: 1; }
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.8vh 0; border-bottom: 1px solid #1a1a1a;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label {
      font-size: clamp(0.8rem, 1.1vw, 1rem); color: #aaa; text-transform: capitalize;
    }
    .stat-label .layer-icon {
      display: inline-block; width: 18px; height: 18px; margin-right: 6px;
      vertical-align: middle; object-fit: contain;
    }
    .stat-value {
      font-size: clamp(1rem, 1.4vw, 1.3rem); font-weight: 600;
      color: #fff; font-variant-numeric: tabular-nums;
    }
    .stat-row.total .stat-label { color: #fff; font-weight: 500; }
    .stat-row.total .stat-value { font-size: clamp(1.2rem, 1.8vw, 1.6rem); color: #4fd1c5; }

    /* Contact group rows */
    .stat-label .group-dot {
      display: inline-block; width: 10px; height: 10px; border-radius: 50%;
      margin-right: 6px; vertical-align: middle; border: 1px solid rgba(255,255,255,0.3);
    }
    #contacts-section .stat-label { font-size: clamp(0.7rem, 1vw, 0.9rem); }

    /* Clock */
    #clock-section { text-align: center; margin-top: 2vh; }
    #clock {
      font-size: clamp(1.1rem, 2vw, 1.8rem); font-weight: 700;
      color: #fff; font-variant-numeric: tabular-nums; letter-spacing: 0.05em;
    }
    #clock-date {
      font-size: clamp(0.7rem, 1vw, 0.9rem); font-weight: 400;
      color: #aaa; margin-top: 0.2vh;
    }
    #clock-label {
      font-size: clamp(0.6rem, 0.8vw, 0.75rem); color: #666;
      text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.5vh;
    }

    /* Highlight card — floating overlay on the map */
    #highlight-card {
      display: none; position: absolute; bottom: 46px; right: 12px;
      width: clamp(280px, 22vw, 380px); z-index: 10;
      background: rgba(17, 17, 17, 0.88); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 1.4vh 1.2vw;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    #highlight-card.visible { display: block; }
    #highlight-header {
      display: flex; align-items: center; gap: 0.6vw; margin-bottom: 0.8vh;
    }
    #highlight-icon {
      width: 26px; height: 26px; object-fit: contain; flex-shrink: 0;
    }
    #highlight-title {
      font-size: clamp(0.65rem, 0.85vw, 0.82rem); font-weight: 600;
      color: #fff; text-transform: uppercase; letter-spacing: 0.05em;
    }
    #highlight-body {
      font-size: clamp(0.65rem, 0.82vw, 0.78rem); color: #ddd;
      line-height: 1.55; white-space: pre-wrap;
    }
    #highlight-progress {
      display: flex; gap: 3px; margin-top: 1vh; flex-wrap: wrap;
    }
    .highlight-pip {
      height: 3px; border-radius: 2px; flex: 1; min-width: 5px;
      background: rgba(255,255,255,0.15); transition: background 0.3s;
    }
    .highlight-pip.active { background: #4fd1c5; }
    .highlight-pip.done   { background: #2a6b66; }
    #highlight-empty {
      display: none; position: absolute; bottom: 46px; right: 12px;
      z-index: 10; padding: 1vh 1.2vw;
      background: rgba(17, 17, 17, 0.85); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      font-size: clamp(0.65rem, 0.82vw, 0.78rem); color: #555; font-style: italic;
    }
    #highlight-empty.visible { display: block; }

    /* Pulsing ring — drawn via MapLibre circle layers, keyframe for CSS fallback indicator */
    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: 0.8; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    /* Error overlay */
    #error-overlay {
      display: none; position: absolute; inset: 0; background: #111;
      color: #fff; font-family: system-ui, sans-serif;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; z-index: 20;
    }
    #error-overlay.visible { display: flex; }
    #error-overlay h1 { font-size: 1.4rem; }
    #error-overlay p  { font-size: 0.9rem; color: #aaa; }
  </style>
</head>
<body>
<div id="layout">
  <div id="map-container">
    <div id="map"></div>
    <!-- Highlight card (shown in highlight mode) -->
    <div id="highlight-card">
      <div id="highlight-header">
        <img id="highlight-icon" src="" alt=""/>
        <span id="highlight-title"></span>
      </div>
      <div id="highlight-body"></div>
      <div id="highlight-progress"></div>
    </div>
    <div id="highlight-empty">Currently no events to display</div>
  </div>
  <div id="info-panel">
    <div id="branding">
      <img src="/static/tak-nz-logo.svg" alt="TAK.NZ"/>
      <div id="branding-text">
        <h1>Common Operational Picture</h1>
        <h2>New Zealand / Aotearoa</h2>
      </div>
    </div>
    <hr class="divider"/>
    <div id="stats">
      <div id="contacts-section"></div>
      <hr class="divider" id="contacts-divider" style="display:none"/>
      <div id="layer-rows"></div>
      <hr class="divider"/>
      <div class="stat-row total">
        <span class="stat-label">Total</span>
        <span class="stat-value" id="count-total">--</span>
      </div>
    </div>
    <hr class="divider"/>
    <div id="clock-section">
      <div id="clock">--:--:--</div>
      <div id="clock-date"></div>
      <div id="clock-label">NZST</div>
    </div>
  </div>
</div>
<div id="error-overlay">
  <h1 id="error-title">Error</h1>
  <p  id="error-detail"></p>
</div>
<script>
'use strict';

var params        = new URLSearchParams(window.location.search);
var KEY           = params.get('key')    || '';
var LAT           = parseFloat(params.get('lat')  || '-41.28');
var LNG           = parseFloat(params.get('lng')  || '174.77');
var ZOOM          = parseFloat(params.get('zoom') || '5');
var LOCKED        = params.get('locked') !== 'false';
var LOOP          = params.get('loop') === 'true';
var HIGHLIGHT     = params.get('highlight') === 'true' || params.get('highlight') === 'zoom' || params.get('highlight') === 'static';
var HIGHLIGHT_FLY = params.get('highlight') === 'zoom';  // fly to item when true, stay in place when false/static

var COT_SOURCES = []; // populated from config
var COT_REFRESH_MS = 10 * 1000;
var VIEW_LOOP = []; // populated from config
var OVERLAYS = []; // populated from config
var HIGHLIGHT_CONFIG = []; // populated from config — highlight layer definitions

// Layer counts for the info panel
var layerCounts = {};

function showError(t, d) {
  document.getElementById('error-title').textContent = t;
  document.getElementById('error-detail').textContent = d;
  document.getElementById('error-overlay').classList.add('visible');
}
if (!KEY) showError('Access denied', 'A valid ?key= parameter is required.');

// ---------------------------------------------------------------------------
// Clock
// ---------------------------------------------------------------------------
function updateClock() {
  var now = new Date();
  var time = now.toLocaleTimeString('en-NZ', {
    timeZone: 'Pacific/Auckland', hour12: false,
    hour: '2-digit', minute: '2-digit', second: '2-digit',
  });
  var date = now.toLocaleDateString('en-NZ', {
    timeZone: 'Pacific/Auckland',
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
  });
  document.getElementById('clock').textContent = time;
  document.getElementById('clock-date').textContent = date;
}
updateClock();
setInterval(updateClock, 1000);

// ---------------------------------------------------------------------------
// Stats update
// ---------------------------------------------------------------------------
var CONTACT_GROUPS_CONFIG = {}; // populated from config
var GROUP_COLORS = {
  'Yellow': '#f59f00', 'Orange': '#f76707', 'Magenta': '#ea4c89',
  'Red': '#d63939', 'Maroon': '#bd081c', 'Purple': '#ae3ec9',
  'Dark Blue': '#0054a6', 'Blue': '#4299e1', 'Cyan': '#17a2b8',
  'Teal': '#0ca678', 'Green': '#74b816', 'Dark Green': '#2fb344',
  'Brown': '#dc4e41', 'White': '#ffffff',
};

// Track per-group contact counts
var contactGroupCounts = {};

function updateContactGroups(features) {
  // Count contacts per group
  var counts = {};
  (features || []).forEach(function(f) {
    var gn = f.properties['group-name'] || '';
    if (gn) counts[gn] = (counts[gn] || 0) + 1;
  });
  contactGroupCounts = counts;
  renderContactGroups();
}

function renderContactGroups() {
  var container = document.getElementById('contacts-section');
  var divider = document.getElementById('contacts-divider');
  container.innerHTML = '';

  // Build sorted array of groups with counts > 0
  var groups = Object.keys(contactGroupCounts)
    .filter(function(g) { return contactGroupCounts[g] > 0; })
    .sort(function(a, b) { return contactGroupCounts[b] - contactGroupCounts[a]; });

  if (groups.length === 0) {
    divider.style.display = 'none';
    return;
  }
  divider.style.display = '';

  groups.forEach(function(groupName) {
    var label = CONTACT_GROUPS_CONFIG[groupName] || groupName;
    var color = GROUP_COLORS[groupName] || '#ffffff';
    var row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML = '<span class="stat-label"><span class="group-dot" style="background:' + color + '"></span>' + label + '</span>'
      + '<span class="stat-value">' + contactGroupCounts[groupName] + '</span>';
    container.appendChild(row);
  });
}

function updateStats() {
  var total = 0;
  COT_SOURCES.forEach(function(src) {
    var count = layerCounts[src.id] || 0;
    total += count;
    var el = document.getElementById('count-' + src.id);
    if (el) el.textContent = count;
  });
  document.getElementById('count-total').textContent = total;
}

// ---------------------------------------------------------------------------
// Fetch LINZ style, add our CoT icon sprite, then init map
// ---------------------------------------------------------------------------
var STYLE_URL = 'https://basemaps.linz.govt.nz/v1/tiles/topographic/EPSG:3857/style/topographic.json?api=d01hzxyc58t4tbxazm3h2jn7g26';
var COT_SPRITE_URL = window.location.origin + '/static/sprite';
var SPRITE_PROXY_BASE = window.location.origin + '/api/sprite';

Promise.all([
  fetch(STYLE_URL).then(function(r) { return r.json(); }),
  fetch('/api/config').then(function(r) { return r.json(); }).catch(function() { return { iconsets: [], layers: [] }; })
]).then(function(results) {
  var style = results[0];
  var config = results[1];

  // Build COT_SOURCES from config layers
  (config.layers || []).forEach(function(layer) {
    COT_SOURCES.push({
      id: layer.id,
      label: layer.label || layer.id,
      endpoint: '/api/cot/' + layer.id,
      icon: layer.icon || null,
      count_geometry: layer.count_geometry || null,
    });
  });

  // Store contact group labels from config
  CONTACT_GROUPS_CONFIG = config.contact_groups || {};

  // Store view loop waypoints from config
  VIEW_LOOP = config.view_loop || [];

  // Store tile overlays from config
  OVERLAYS = config.overlays || [];

  // Store highlight config
  HIGHLIGHT_CONFIG = (config.highlight || []).slice().sort(function(a, b) {
    return (a.priority || 99) - (b.priority || 99);
  });

  // Build stat rows for non-contacts layers only (contacts shown separately)
  var layerContainer = document.getElementById('layer-rows');
  COT_SOURCES.forEach(function(src) {
    if (src.id === 'contacts') return; // contacts handled by renderContactGroups
    var iconHtml = '';
    if (src.icon) {
      var iconUrl = '/api/icons/' + encodeURIComponent(src.icon + '.png') + '?key=' + encodeURIComponent(KEY);
      iconHtml = '<img class="layer-icon" src="' + iconUrl + '" alt=""/>';
    }
    var row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML = '<span class="stat-label">' + iconHtml + src.label + '</span><span class="stat-value" id="count-' + src.id + '">--</span>';
    layerContainer.appendChild(row);
  });

  var linzSprite = style.sprite;
  var sprites = [
    { id: 'default', url: COT_SPRITE_URL },
    { id: 'linz-topographic', url: linzSprite }
  ];

  (config.iconsets || []).forEach(function(iconsetId) {
    sprites.push({ id: iconsetId, url: SPRITE_PROXY_BASE + '/' + encodeURIComponent(iconsetId) + '/sprite' });
  });

  style.sprite = sprites;
  initMap(style);
}).catch(function(err) {
  console.error('Failed to load style/config, falling back', err);
  initMap(STYLE_URL);
});

// Utility — returns an empty GeoJSON FeatureCollection
function emptyFC() { return { type: 'FeatureCollection', features: [] }; }

function initMap(style) {
// ---------------------------------------------------------------------------
// Map
// ---------------------------------------------------------------------------
var map = window.map = new maplibregl.Map({
  container:          'map',
  style:              style,
  center:             [LNG, LAT],
  zoom:               ZOOM,
  attributionControl: false,
  interactive:        !LOCKED,
  maxTileCacheSize:   512,
});

if (LOCKED) {
  ['dragPan','scrollZoom','boxZoom','dragRotate','keyboard','doubleClickZoom','touchZoomRotate']
    .forEach(function(m) { try { map[m].disable(); } catch(e) {} });
}

map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');
map.addControl(new maplibregl.ScaleControl({ maxWidth: 150, unit: 'metric' }), 'bottom-left');

// ---------------------------------------------------------------------------
// Icon recoloring — creates tinted versions of icons on demand.
// When a feature has both icon and marker-color, processFeature sets the
// icon-image to "<baseId>-colored-<hex>". This handler intercepts the missing
// image request, gets the base icon, recolors white pixels, and registers it.
// ---------------------------------------------------------------------------
map.on('styleimagemissing', function(e) {
  var id = e.id;
  if (!id.includes('-colored-')) return;

  var parts = id.split('-colored-');
  var baseId = parts[0];
  var hex = parts[1];
  if (!baseId || !hex) return;

  var baseImage = map.getImage(baseId);
  if (!baseImage) {
    // Base not loaded yet. Register the base ID as the image so the icon
    // at least shows uncolored. When the source updates (every 10s refresh),
    // styleimagemissing will fire again for new features and the sprite
    // will be loaded by then.
    return;
  }

  var width = baseImage.data.width;
  var height = baseImage.data.height;
  var data = new Uint8ClampedArray(baseImage.data.data);

  // Parse target color
  var r = parseInt(hex.substring(0, 2), 16) || 0;
  var g = parseInt(hex.substring(2, 4), 16) || 0;
  var b = parseInt(hex.substring(4, 6), 16) || 0;

  // Recolor white/light pixels (R>200 && G>200 && B>200)
  for (var i = 0; i < data.length; i += 4) {
    if (data[i + 3] === 0) continue; // skip transparent
    if (data[i] > 200 && data[i + 1] > 200 && data[i + 2] > 200) {
      data[i] = r;
      data[i + 1] = g;
      data[i + 2] = b;
    }
  }

  if (!map.hasImage(id)) {
    map.addImage(id, { width: width, height: height, data: data });
  }
});

// ---------------------------------------------------------------------------
// Hash-based flyTo — change #lat=-41&lng=174&zoom=8 to fly without reload
// ---------------------------------------------------------------------------
function parseHash() {
  var hash = window.location.hash.replace(/^#/, '');
  if (!hash) return null;
  var p = new URLSearchParams(hash);
  var lat = parseFloat(p.get('lat'));
  var lng = parseFloat(p.get('lng'));
  var zoom = parseFloat(p.get('zoom'));
  if (isNaN(lat) && isNaN(lng) && isNaN(zoom)) return null;
  return {
    center: (!isNaN(lat) && !isNaN(lng)) ? [lng, lat] : undefined,
    zoom: !isNaN(zoom) ? zoom : undefined,
  };
}

function applyHash() {
  var view = parseHash();
  if (!view) return;
  map.flyTo({
    center: view.center || map.getCenter(),
    zoom: view.zoom != null ? view.zoom : map.getZoom(),
    duration: 3000,
    essential: true,
  });
}

window.addEventListener('hashchange', applyHash);
// Apply initial hash if present
if (window.location.hash) applyHash();

// ---------------------------------------------------------------------------
// View loop — cycles through configured waypoints when ?loop=true
// ---------------------------------------------------------------------------
if (LOOP && VIEW_LOOP.length > 0) {
  var loopIndex = 0;

  function flyToNext() {
    var wp = VIEW_LOOP[loopIndex];
    map.flyTo({
      center: [wp.lng, wp.lat],
      zoom: wp.zoom,
      duration: 3000,
      essential: true,
    });
    // After dwell time, advance to next waypoint
    var dwell = (wp.time || 10) * 1000;
    setTimeout(function() {
      loopIndex = (loopIndex + 1) % VIEW_LOOP.length;
      flyToNext();
    }, dwell + 3000); // dwell + fly duration
  }

  // Start the loop after map loads
  map.on('load', function() {
    flyToNext();
  });
}

map.on('load', function() {
  // Add tile overlays (above basemap, below CoT layers)
  OVERLAYS.forEach(function(overlay) {
    map.addSource(overlay.id, {
      type: 'raster',
      tiles: [overlay.url],
      tileSize: 256,
    });
    map.addLayer({
      id: overlay.id,
      type: 'raster',
      source: overlay.id,
      paint: {
        'raster-opacity': overlay.opacity != null ? overlay.opacity : 1,
      },
    });
  });

  addLayers();
});

function addLayers() {
  COT_SOURCES.forEach(function(src) {
    map.addSource(src.id, { type: 'geojson', data: emptyFC() });

    if (src.id === 'contacts') {
      // Contacts: colored circle based on group color
      map.addLayer({
        id: src.id, type: 'circle', source: src.id,
        filter: ['==', ['geometry-type'], 'Point'],
        paint: {
          'circle-color':        ['string', ['get', 'marker-color'], '#ffffff'],
          'circle-radius':       8,
          'circle-stroke-color': '#ffffff',
          'circle-stroke-width': 2,
          'circle-opacity':      1,
        },
      });

      // Contacts: callsign label
      map.addLayer({
        id: src.id + '-label', type: 'symbol', source: src.id,
        filter: ['==', ['geometry-type'], 'Point'],
        layout: {
          'text-field':         ['coalesce', ['get', 'callsign'], ''],
          'text-size':          11,
          'text-offset':        [0, 1.8],
          'text-anchor':        'top',
          'text-font':          ['Open Sans Bold'],
          'text-allow-overlap': false,
        },
        paint: {
          'text-color':      '#ffffff',
          'text-halo-color': '#000000',
          'text-halo-width': 2,
        },
      });
    } else {
      // Standard layers: fill + line + icon + course arrow + label

      // Polygon fill layer
      map.addLayer({
        id: src.id + '-fill', type: 'fill', source: src.id,
        filter: ['==', ['geometry-type'], 'Polygon'],
        paint: {
          'fill-color':   ['string', ['get', 'fill'], '#d63939'],
          'fill-opacity': ['number', ['get', 'fill-opacity'], 0.3],
        },
      });

      // Line/polygon outline layer
      map.addLayer({
        id: src.id + '-line', type: 'line', source: src.id,
        filter: ['any', ['==', ['geometry-type'], 'Polygon'], ['==', ['geometry-type'], 'LineString']],
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: {
          'line-color':   ['string', ['get', 'stroke'], '#d63939'],
          'line-width':   ['number', ['get', 'stroke-width'], 2],
          'line-opacity': ['number', ['get', 'stroke-opacity'], 1],
        },
      });

      // Icon layer (points with icon — includes colored icons)
      map.addLayer({
        id: src.id, type: 'symbol', source: src.id,
        filter: ['all', ['==', ['geometry-type'], 'Point'], ['has', 'icon']],
        layout: {
          'icon-image':            ['get', 'icon'],
          'icon-size':             1.0,
          'icon-allow-overlap':    true,
          'icon-ignore-placement': true,
        },
      });

      // Symbol layer for points without icon (uses CoT type from sprite)
      map.addLayer({
        id: src.id + '-type', type: 'symbol', source: src.id,
        filter: ['all', ['==', ['geometry-type'], 'Point'], ['!', ['has', 'icon']], ['!', ['has', 'marker-color']]],
        layout: {
          'icon-image':            ['get', 'type'],
          'icon-size':             1.0,
          'icon-allow-overlap':    true,
          'icon-ignore-placement': true,
        },
      });

      // Colored circle layer (points with marker-color but no icon)
      map.addLayer({
        id: src.id + '-circle', type: 'circle', source: src.id,
        filter: ['all', ['==', ['geometry-type'], 'Point'], ['has', 'marker-color'], ['!', ['has', 'icon']]],
        paint: {
          'circle-color':        ['get', 'marker-color'],
          'circle-radius':       6,
          'circle-stroke-color': '#ffffff',
          'circle-stroke-width': 1.5,
          'circle-opacity':      1,
        },
      });

      // Course arrow layer
      map.addLayer({
        id: src.id + '-course', type: 'symbol', source: src.id,
        filter: ['all', ['==', ['geometry-type'], 'Point'], ['has', 'course']],
        layout: {
          'icon-image':            'course',
          'icon-size':             0.33,
          'icon-rotate':           ['get', 'course'],
          'icon-allow-overlap':    true,
          'icon-ignore-placement': true,
          'icon-anchor':           'bottom',
          'icon-offset':           [0, -42],
        },
      });

      // Callsign text layer
      map.addLayer({
        id: src.id + '-label', type: 'symbol', source: src.id,
        filter: ['==', ['geometry-type'], 'Point'],
        layout: {
          'text-field':            ['coalesce', ['get', 'callsign'], ['get', 'name'], ''],
          'text-size':             11,
          'text-offset':           [0, 2.2],
          'text-anchor':           'top',
          'text-font':             ['Open Sans Bold'],
          'text-allow-overlap':    false,
          'icon-allow-overlap':    true,
        },
        paint: {
          'text-color':       '#ffffff',
          'text-halo-color':  '#000000',
          'text-halo-width':  2,
        },
      });
    }
  });

  loadAll();
  setInterval(refreshAll, COT_REFRESH_MS);
  // Init highlight mode after sources/layers are ready
  if (HIGHLIGHT) initHighlight();
}

// ---------------------------------------------------------------------------
// Data helpers
// ---------------------------------------------------------------------------

function processFeature(f) {
  if (f.geometry && f.geometry.type === 'Point' && f.geometry.coordinates.length === 3) {
    f.geometry.coordinates = [f.geometry.coordinates[0], f.geometry.coordinates[1]];
  }

  // Preserve raw metadata object for template rendering before flattening
  var metadata = f.properties && f.properties.metadata;
  var metaReg    = metadata && metadata.r;
  var metaFlight = metadata && metadata.flight;

  var clean = {};
  Object.keys(f.properties || {}).forEach(function(k) {
    var v = f.properties[k];
    if (v === null || typeof v === 'string' || typeof v === 'number' || typeof v === 'boolean') {
      clean[k] = v;
    }
  });
  // Preserve raw metadata for template rendering (as _metadata, not flattened)
  if (metadata && typeof metadata === 'object') {
    clean._metadata = metadata;
  }
  f.properties = clean;

  // Fix "UNKNOWN" callsign — use registration or flight metadata as fallback
  if (f.properties.callsign === 'UNKNOWN' || !f.properties.callsign) {
    var fallback = (metaFlight && metaFlight.trim()) || metaReg || '';
    if (fallback) f.properties.callsign = fallback;
  }

  // Transform icon property from "uuid/path/icon.png" to "uuid:path/icon"
  if (f.properties.icon && f.properties.icon.includes('/')) {
    var icon = f.properties.icon;
    var firstSlash = icon.indexOf('/');
    var iconsetId = icon.substring(0, firstSlash);
    var iconPath = icon.substring(firstSlash + 1).replace(/\.png$/, '');
    f.properties.icon = iconsetId + ':' + iconPath;
  }

  // If feature has both icon and marker-color, create a colored icon reference
  if (f.properties.icon && f.properties['marker-color']) {
    var color = f.properties['marker-color'].replace('#', '');
    f.properties.icon = f.properties.icon + '-colored-' + color;
  }

  return f;
}

function filterExpired(features) {
  var now = Date.now();
  return features.filter(function(f) {
    var stale = f.properties && f.properties.stale;
    if (!stale) return true;
    return new Date(stale).getTime() > now;
  });
}

function loadAll() {
  COT_SOURCES.forEach(function(src) {
    fetch(src.endpoint + '?key=' + encodeURIComponent(KEY))
      .then(function(r) { return r.json(); })
      .then(function(fc) {
        fc.features = filterExpired(fc.features.map(processFeature));
        layerCounts[src.id] = src.count_geometry
          ? fc.features.filter(function(f) { return f.geometry && f.geometry.type === src.count_geometry; }).length
          : fc.features.length;
        window.map.getSource(src.id).setData(fc);
        if (src.id === 'contacts') updateContactGroups(fc.features);
        if (HIGHLIGHT && HIGHLIGHT_CONFIG.some(function(h) { return h.layer === src.id; })) {
          highlightFeatureStore[src.id] = fc.features;
          console.log('[highlight] store loaded: ' + src.id + ' features=' + fc.features.length);
        }
        updateStats();
      })
      .catch(function(err) { console.warn('[' + src.id + ']', err.message); });
  });
}

function refreshAll() {
  COT_SOURCES.forEach(function(src) {
    fetch(src.endpoint + '?key=' + encodeURIComponent(KEY))
      .then(function(r) { return r.json(); })
      .then(function(fc) {
        fc.features = filterExpired(fc.features.map(processFeature));
        layerCounts[src.id] = src.count_geometry
          ? fc.features.filter(function(f) { return f.geometry && f.geometry.type === src.count_geometry; }).length
          : fc.features.length;
        window.map.getSource(src.id).setData(fc);
        if (src.id === 'contacts') updateContactGroups(fc.features);
        if (HIGHLIGHT && HIGHLIGHT_CONFIG.some(function(h) { return h.layer === src.id; })) {
          highlightFeatureStore[src.id] = fc.features;
        }
        updateStats();
      })
      .catch(function(err) { console.warn('[' + src.id + ']', err.message); });
  });
}

} // end initMap

// ---------------------------------------------------------------------------
// Highlight mode — mutually exclusive with view loop.

// In-memory store of features per layer, kept fresh by the main refresh cycle
var highlightFeatureStore = {}; // { layerId: [features] }
var highlightItems = [];        // flat sorted list of { feature, layerCfg, sourceCfg }
var highlightIndex = 0;
var highlightTimer = null;
var highlightRafHandle = null;
var highlightRafStart = null;

// ---------------------------------------------------------------------------
// Template renderer — resolves {{field}} and {{metadata.field}} against a
// processed feature's properties. Missing fields are omitted gracefully.
// ---------------------------------------------------------------------------
function renderTemplate(template, feature) {
  var props = feature.properties || {};
  // Re-inflate metadata from flat properties (processFeature flattens it)
  // We keep a reference to the original metadata object on the feature if present
  var meta = props._metadata || {};

  return template.replace(/\{\{([^}]+)\}\}/g, function(_, expr) {
    expr = expr.trim();
    // Support pipe modifiers: {{field|modifier:arg}}
    var parts = expr.split('|');
    var path = parts[0].trim();
    var modifier = parts.length > 1 ? parts[1].trim() : null;

    // Resolve value
    var value;
    if (path.startsWith('metadata.')) {
      var key = path.substring('metadata.'.length);
      value = meta[key];
    } else {
      value = props[path];
    }
    if (value == null || value === '' || value === 'null' || value === 'undefined') return '';

    // Apply modifier
    if (modifier) {
      var modParts = modifier.split(':');
      var modName = modParts[0];
      var modArg = modParts[1] !== undefined ? Number(modParts[1]) : undefined;
      if (modName === 'fixed' && typeof value === 'number' && modArg !== undefined) {
        return value.toFixed(modArg);
      }
      if (modName === 'round' && typeof value === 'number') {
        return String(Math.round(value));
      }
      if (modName === 'upper' && typeof value === 'string') {
        return value.toUpperCase();
      }
      if (modName === 'lower' && typeof value === 'string') {
        return value.toLowerCase();
      }
      if (modName === 'date') {
        // Format ISO timestamp as local NZ time: "6 Jul 2026, 10:21 PM"
        var d = new Date(value);
        if (!isNaN(d.getTime())) {
          return d.toLocaleString('en-NZ', {
            timeZone: 'Pacific/Auckland',
            day: 'numeric', month: 'short', year: 'numeric',
            hour: 'numeric', minute: '2-digit', hour12: false
          });
        }
      }
      if (modName === 'ago') {
        // Show relative time: "3h ago", "45min ago"
        var d = new Date(value);
        if (!isNaN(d.getTime())) {
          var diffMs = Date.now() - d.getTime();
          var diffMin = Math.floor(diffMs / 60000);
          if (diffMin < 1) return 'just now';
          if (diffMin < 60) return diffMin + 'min ago';
          var diffHrs = Math.floor(diffMin / 60);
          if (diffHrs < 24) return diffHrs + 'h ago';
          var diffDays = Math.floor(diffHrs / 24);
          return diffDays + 'd ago';
        }
      }
    }
    return String(value);
  }).replace(/\n{3,}/g, '\n\n').trim(); // collapse multiple blank lines
}

// ---------------------------------------------------------------------------
// Build sorted item list from current feature stores — Points only.
// Sorted geographically north-to-south (descending latitude) within priority.
// ---------------------------------------------------------------------------
function buildHighlightItems() {
  var items = [];
  HIGHLIGHT_CONFIG.forEach(function(hlCfg) {
    var features = highlightFeatureStore[hlCfg.layer] || [];
    var srcCfg = COT_SOURCES.find(function(s) { return s.id === hlCfg.layer; });
    // Filter to highlightable geometries
    var eligible = features.filter(function(f) {
      if (!f.geometry) return false;
      if (f.geometry.type === 'Point') return true;
      if (hlCfg.include_lines && (f.geometry.type === 'LineString' || f.geometry.type === 'MultiLineString')) return true;
      return false;
    });
    // Sort north to south (higher latitude first)
    eligible.sort(function(a, b) {
      var latA = getHighlightLat(a);
      var latB = getHighlightLat(b);
      return latB - latA;
    });
    eligible.forEach(function(f) {
      items.push({ feature: f, layerCfg: hlCfg, sourceCfg: srcCfg });
    });
  });
  return items;
}

// Get representative latitude for sorting (midpoint for lines)
function getHighlightLat(f) {
  if (f.geometry.type === 'Point') return f.geometry.coordinates[1] || 0;
  if (f.geometry.type === 'LineString') return getLineMidpoint(f.geometry.coordinates)[1];
  if (f.geometry.type === 'MultiLineString') return getLineMidpoint(f.geometry.coordinates[0] || [])[1];
  return 0;
}

// Get midpoint of a LineString coordinate array
function getLineMidpoint(coords) {
  if (!coords || coords.length === 0) return [0, 0];
  var midIdx = Math.floor(coords.length / 2);
  return [coords[midIdx][0], coords[midIdx][1]];
}

// Get bounding box of a LineString for fitBounds
function getLineBounds(coords) {
  var minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
  for (var i = 0; i < coords.length; i++) {
    if (coords[i][0] < minLng) minLng = coords[i][0];
    if (coords[i][0] > maxLng) maxLng = coords[i][0];
    if (coords[i][1] < minLat) minLat = coords[i][1];
    if (coords[i][1] > maxLat) maxLat = coords[i][1];
  }
  return [[minLng, minLat], [maxLng, maxLat]];
}

// ---------------------------------------------------------------------------
// Get bounding box of a polygon feature's coordinates
// ---------------------------------------------------------------------------
function getPolygonBounds(coords) {
  var minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
  var rings = Array.isArray(coords[0][0]) ? coords : [coords]; // handle nested
  rings.forEach(function(ring) {
    ring.forEach(function(pt) {
      if (pt[0] < minLng) minLng = pt[0];
      if (pt[0] > maxLng) maxLng = pt[0];
      if (pt[1] < minLat) minLat = pt[1];
      if (pt[1] > maxLat) maxLat = pt[1];
    });
  });
  return [[minLng, minLat], [maxLng, maxLat]];
}

// ---------------------------------------------------------------------------
// Find the polygon associated with a -center Point feature
// (polygon ID = center ID with '-center' suffix stripped)
// ---------------------------------------------------------------------------
function findAssociatedPolygon(centerFeature, layerId) {
  var centerId = centerFeature.id || (centerFeature.properties && centerFeature.properties.id) || '';
  if (!centerId.endsWith('-center')) return null;
  var polygonId = centerId.replace(/-center$/, '');
  var features = highlightFeatureStore[layerId] || [];
  return features.find(function(f) {
    var fid = f.id || (f.properties && f.properties.id) || '';
    return fid === polygonId && f.geometry && f.geometry.type === 'Polygon';
  }) || null;
}

// ---------------------------------------------------------------------------
// Pulsing ring — MapLibre animation using requestAnimationFrame on a
// dedicated 'highlight-pulse' source with a single Point feature.
// For static mode: large static halo circle instead.
// ---------------------------------------------------------------------------
function initHighlightLayers() {
  var m = window.map;
  m.addSource('highlight-point', { type: 'geojson', data: emptyFC() });

  m.addLayer({
    id: 'highlight-halo-outer', type: 'circle', source: 'highlight-point',
    paint: {
      'circle-radius':         20,
      'circle-color':          'transparent',
      'circle-stroke-color':   '#4fd1c5',
      'circle-stroke-width':   3,
      'circle-opacity':        0.8,
      'circle-stroke-opacity': 0.8,
      'circle-pitch-alignment': 'map',
    },
  });
  m.addLayer({
    id: 'highlight-halo-inner', type: 'circle', source: 'highlight-point',
    paint: {
      'circle-radius':          32,
      'circle-color':           'transparent',
      'circle-stroke-color':    '#4fd1c5',
      'circle-stroke-width':    3,
      'circle-pitch-alignment': 'map',
    },
  });
}

function animatePulse(timestamp) {
  if (!highlightRafStart) highlightRafStart = timestamp;
  var elapsed = (timestamp - highlightRafStart) % 1800;
  var progress = elapsed / 1800;
  var outerRadius   = 20 + progress * 36;
  var outerOpacity  = 0.8 * (1 - progress);
  var strokeOpacity = 0.9 * (1 - progress);
  try {
    window.map.setPaintProperty('highlight-halo-outer', 'circle-radius', outerRadius);
    window.map.setPaintProperty('highlight-halo-outer', 'circle-opacity', outerOpacity);
    window.map.setPaintProperty('highlight-halo-outer', 'circle-stroke-opacity', strokeOpacity);
  } catch(e) {}
  highlightRafHandle = requestAnimationFrame(animatePulse);
}

function startPulse() {
  stopPulse();
  highlightRafStart = null;
  highlightRafHandle = requestAnimationFrame(animatePulse);
}

function stopPulse() {
  if (highlightRafHandle) {
    cancelAnimationFrame(highlightRafHandle);
    highlightRafHandle = null;
  }
}

// ---------------------------------------------------------------------------
// Set highlighted feature on map
// ---------------------------------------------------------------------------
function setHighlightFeature(feature) {
  var src = window.map.getSource('highlight-point');
  if (!src) return;
  if (!feature || !feature.geometry) {
    src.setData(emptyFC());
    stopPulse();
    return;
  }
  // Derive a point for the highlight ring
  var pointGeom;
  if (feature.geometry.type === 'Point') {
    pointGeom = feature.geometry;
  } else if (feature.geometry.type === 'LineString') {
    var mid = getLineMidpoint(feature.geometry.coordinates);
    pointGeom = { type: 'Point', coordinates: mid };
  } else if (feature.geometry.type === 'MultiLineString') {
    var mid = getLineMidpoint(feature.geometry.coordinates[0] || []);
    pointGeom = { type: 'Point', coordinates: mid };
  } else {
    src.setData(emptyFC());
    stopPulse();
    return;
  }
  src.setData({ type: 'FeatureCollection', features: [{ type: 'Feature', geometry: pointGeom, properties: {} }] });
  startPulse();
}

// ---------------------------------------------------------------------------
// Render the detail card in the info panel
// ---------------------------------------------------------------------------
function renderHighlightCard(item) {
  var card  = document.getElementById('highlight-card');
  var empty = document.getElementById('highlight-empty');

  if (!item) {
    card.classList.remove('visible');
    empty.classList.add('visible');
    stopPulse();
    var src = window.map && window.map.getSource('highlight-point');
    if (src) src.setData(emptyFC());
    return;
  }

  empty.classList.remove('visible');
  card.classList.add('visible');

  // Icon — show the layer category icon (same as info panel)
  var iconEl = document.getElementById('highlight-icon');
  var srcIcon = item.sourceCfg && item.sourceCfg.icon;
  if (srcIcon) {
    iconEl.src = '/api/icons/' + encodeURIComponent(srcIcon + '.png') + '?key=' + encodeURIComponent(KEY);
    iconEl.style.display = '';
  } else {
    iconEl.style.display = 'none';
  }

  // Title — layer label
  document.getElementById('highlight-title').textContent = item.sourceCfg ? item.sourceCfg.label : item.layerCfg.layer;

  // Body — rendered template
  var body = renderTemplate(item.layerCfg.template || '{{callsign}}', item.feature);
  document.getElementById('highlight-body').textContent = body || item.feature.properties.callsign || '';

  // Progress pips
  var pipContainer = document.getElementById('highlight-progress');
  pipContainer.innerHTML = '';
  highlightItems.forEach(function(_, i) {
    var pip = document.createElement('div');
    pip.className = 'highlight-pip' + (i < highlightIndex ? ' done' : i === highlightIndex ? ' active' : '');
    pipContainer.appendChild(pip);
  });
}

// ---------------------------------------------------------------------------
// Advance to next highlight item
// ---------------------------------------------------------------------------
function highlightNext() {
  if (highlightTimer) { clearTimeout(highlightTimer); highlightTimer = null; }

  // Rebuild item list from latest data on each cycle
  highlightItems = buildHighlightItems();

  if (highlightItems.length === 0) {
    renderHighlightCard(null);
    // Retry after 5s
    highlightTimer = setTimeout(highlightNext, 5000);
    return;
  }

  // Wrap index
  if (highlightIndex >= highlightItems.length) highlightIndex = 0;

  var item = highlightItems[highlightIndex];

  // Update map highlight
  setHighlightFeature(item.feature);

  // Map navigation in zoom mode — duration scales with distance
  if (HIGHLIGHT_FLY) {
    var flyDuration = 3500; // default
    var targetCoords = null;

    if (item.feature.geometry.type === 'Point') {
      targetCoords = item.feature.geometry.coordinates;
    } else if (item.feature.geometry.type === 'LineString') {
      targetCoords = getLineMidpoint(item.feature.geometry.coordinates);
    } else if (item.feature.geometry.type === 'MultiLineString') {
      targetCoords = getLineMidpoint(item.feature.geometry.coordinates[0] || []);
    }

    if (targetCoords) {
      var currentCenter = window.map.getCenter();
      var dLat = targetCoords[1] - currentCenter.lat;
      var dLng = targetCoords[0] - currentCenter.lng;
      var distDeg = Math.sqrt(dLat * dLat + dLng * dLng);
      // Scale: ~1500ms for nearby (<1°), up to ~5000ms for far (>8°)
      flyDuration = Math.max(1500, Math.min(5000, 1500 + distDeg * 450));
    }

    if (item.layerCfg.fit_polygon) {
      var polygon = findAssociatedPolygon(item.feature, item.layerCfg.layer);
      if (polygon && polygon.geometry && polygon.geometry.coordinates) {
        var bounds = getPolygonBounds(polygon.geometry.coordinates);
        window.map.fitBounds(bounds, { padding: 80, duration: flyDuration, essential: true, maxZoom: 14 });
      } else if (targetCoords) {
        window.map.flyTo({ center: [targetCoords[0], targetCoords[1]], zoom: item.layerCfg.zoom || 9, duration: flyDuration, essential: true });
      }
    } else if (item.feature.geometry.type === 'LineString' || item.feature.geometry.type === 'MultiLineString') {
      var lineCoords = item.feature.geometry.type === 'LineString' ? item.feature.geometry.coordinates : item.feature.geometry.coordinates[0] || [];
      var lineBounds = getLineBounds(lineCoords);
      window.map.fitBounds(lineBounds, { padding: 80, duration: flyDuration, essential: true, maxZoom: 14 });
    } else if (targetCoords) {
      window.map.flyTo({ center: [targetCoords[0], targetCoords[1]], zoom: item.layerCfg.zoom || 9, duration: flyDuration, essential: true });
    }
  }

  // Render card
  renderHighlightCard(item);

  // Schedule next
  var dwell = (item.layerCfg.dwell || 10) * 1000;
  highlightIndex = (highlightIndex + 1) % highlightItems.length;
  highlightTimer = setTimeout(highlightNext, dwell);
}

// ---------------------------------------------------------------------------
// Init highlight mode — called after map loads
// ---------------------------------------------------------------------------
function initHighlight() {
  if (!HIGHLIGHT || HIGHLIGHT_CONFIG.length === 0) {
    console.log('[highlight] disabled — HIGHLIGHT=' + HIGHLIGHT + ' config length=' + HIGHLIGHT_CONFIG.length);
    return;
  }
  console.log('[highlight] init — mode=' + (HIGHLIGHT_FLY ? 'zoom' : 'static') + ' layers=' + HIGHLIGHT_CONFIG.map(function(h){return h.layer;}).join(','));
  initHighlightLayers();

  // Poll until the feature store has data, then start cycling
  function waitForData() {
    var total = 0;
    HIGHLIGHT_CONFIG.forEach(function(h) {
      total += (highlightFeatureStore[h.layer] || []).length;
    });
    if (total === 0) {
      console.log('[highlight] waiting for data...');
      setTimeout(waitForData, 1000);
      return;
    }
    highlightItems = buildHighlightItems();
    console.log('[highlight] starting cycle — ' + highlightItems.length + ' items');
    try { highlightNext(); } catch(e) { console.error('[highlight] error:', e); }
  }
  waitForData();
}
</script>
